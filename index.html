 ["E3","Independent rethink of peace operations","peace",1,"WS3","tt","New",EC,1,true,"Treat the forthcoming SG peace-operations review as the start, not the end, of reflection; an independent perspective may be needed because departmental defensiveness prevents a clear-eyed rethink amid austerity and a changed international environment."],
 ["E4","Reaffirm limits on gratis personnel","enable",1,"WS1","tt","New",EC,null,false,"Member states should reaffirm the GA resolution 51/243 limits on 'gratis personnel' (specialised, time-limited only). Type II gratis personnel rose 193% system-wide (121→355) and 985.7% at peacekeeping HQ (7→76) by 2022-23, functioning like earmarked contributions that create donor siloes of influence. No UN80 package addresses this."],

 ["E6","Observer-style GA access + fee for private sector","enable",3,"EXT","tt","New",EC,null,false,"A thought experiment: let the GA grant private-sector entities an observer-style status (defined participation rights, no vote) for an annual fee set from a notional assessment rate based on revenue, with diversity criteria and caps. The private sector gave ~$574m to the UN system in 2024 ($152m to the Secretariat); top-50 Fortune firms might pay $2–10m each. Fees supplement, not replace, assessed contributions, keeping oversight with member states."],
 ["E7","Integrated overhaul of contingent reimbursement","peace",3,"WS1","tt","New",EC,1,true,"Use the rare 2026 conjunction of the contingent-owned-equipment and personnel reimbursement review cycles to launch a GA-led overhaul into one integrated framework — modelled on the 2012 senior advisory group — meeting four objectives: subsidise troop/police contributors, incentivise mandate implementation, enable specialised capabilities, and stay affordable. Usage-based reimbursement alone is a quick fix that could worsen the UN's largest source of greenhouse-gas emissions."],
 ["E8","Reassess the stabilisation / 'robust turn'","peace",1,"WS3","tt","New",EC,1,true,"Make an honest reassessment of the stabilisation / 'robust turn' central to the peace-operations review: peacekeeper casualties spiked after MONUSCO's Force Intervention Brigade (res 2098, 2013), and safety can't be fixed by training, equipment and prosecutions alone while missions become parties to conflict and forfeit impartiality."],
 ["E9","Weigh IHL consequences when mandating","peace",1,"EXT","tt","New",EC,1,true,"The Security Council should weigh international-humanitarian-law consequences when mandating robust or stabilisation missions, or authorising UN support to non-UN forces (e.g. under res 2719): such roles can strip peacekeepers of protected non-combatant status and make them legitimate targets — a consequence poorly understood when robust mandates are adopted."],
 ["G1","Power Audit transparency dashboard","enable",1,"WS1","tt","New",GUNG,null,false,"Launch a public 'Power Audit' dashboard the Secretariat can publish without member-state approval: funding flows (core vs earmarked, by donor and agency), appointment patterns (nationality, gender, background of D1+ staff), and voting alignments. Quarterly, with interactive filters. Makes invisible power visible."],
 ["G2","Funding Compact compliance report","enable",1,"WS1","tt","New",GUNG,null,false,"Publish an annual Funding Compact compliance report naming which countries increased core funding, which kept earmarking and which cut flexibility — turning voluntary pledges into reputational stakes. Core/pooled funding sits at 13% against a 30% target."],
 ["G3","Virtual access to all informal consultations","coord",1,"WS1","tt","New",GUNG,null,false,"Direct that every informal consultation negotiating draft text offer virtual participation to any interested member state — links and advance notice, no expansion of rooms. Narrows the capacity gap for smaller missions, who can't staff the roughly 80% of text settled informally."],
 ["G4","Real-time earmarking disclosure","enable",1,"WS1","tt","New",GUNG,null,false,"Require real-time disclosure of earmarked funding: any contribution over $5m disclosed (donor, amount, purpose, duration, conditionalities) within 30 days, plus quarterly reports — instead of piecemeal annual reporting after decisions are made."],
 ["G5","Inclusion Scorecard for civil-society access","rights",1,"WS1","tt","New",GUNG,null,false,"Create an Inclusion Scorecard ranking UN forums (boards, ECOSOC segments, GA committees) on civil-society access: advance notice, speaking time, access to informals and feedback. Name forums that score poorly."],
 ["G6","Annual State of UNDS Governance address","coord",1,"WS1","tt","New",GUNG,null,false,"Institutionalise an annual 'State of UNDS Governance' address to ECOSOC focused on power dynamics — whether the triple disconnect between authority, resources and affected populations is narrowing, which reforms work, who leads and lags."],
 ["G7","Board consultation above 65% earmarking","enable",1,"WS1","tt","New",GUNG,null,false,"Issue a system-wide instruction that no entity accept earmarked contributions above 65% of its funding without explicit executive-board consultation. Doesn't ban earmarking; makes heavy earmarking a board decision rather than management discretion."],
 ["G8","Tie funding quality to governance access","enable",2,"EXT","tt","New",GUNG,null,false,"Enforce the Funding Compact by linking funding quality to governance access: compliant donors gain penholder priority, ECOSOC speaking slots and recognition in SG reports; heavy earmarkers see reduced drafting and coordination influence. Aim to move core/pooled funding from 13% toward 25-30% over five years."],
 ["G9","Commission the evidence base on earmarking","enable",1,"WS1","tt","New",GUNG,null,false,"Commission independent evidence to make the case for funding reform: the real cost of earmarking (transaction costs, duplicated reporting, fragmentation — estimated at 20-30% of resources) and a cost-benefit analysis of UNDS delivery against bilateral, foundation, private-sector and South-South alternatives."],
 ["G10","Pilot ECOSOC budget authority","coord",2,"EXT","tt","New",GUNG,null,false,"Pilot giving ECOSOC budget authority over 10-15% of pooled (non-earmarked) funds, so the UN's coordinating body has real resource leverage rather than advisory authority. If it improves coordination, scale it."],
 ["G11","Shift donors to core + diversity index","enable",1,"EXT","tt","New",GUNG,null,false,"Quietly negotiate the top five donors to shift 5% of earmarked funding to core each year over five years (framed as concentrating their board influence), and publish a Funding Diversity Index ranking entities by donor concentration with targets to cut single-donor dependence."],
 ["G12","Rebalance penholding to the Global South","coord",2,"EXT","tt","New",GUNG,null,false,"Rebalance who holds the pen on development resolutions toward the Global South: rotate 50% of penholder positions to programme countries (which host 86% of operations), pair Northern and Southern co-penholders as standard, and stand up a technical drafting-support unit in DESA/EOSG."],
 ["G13","Resource the G77 + bridge-builders","coord",2,"EXT","tt","New",GUNG,null,false,"Give Southern coalitions the infrastructure donors already have: a standing G77 and China secretariat and coordination platform (the G24-at-the-IMF model), plus a Bridge-Builder States initiative that convenes and credits middle powers who broker across blocs."],
 ["G14","Coordination with teeth: DSG + RCs","coord",2,"WS3","tt","New",GUNG,null,false,"Give coordination teeth: hand the Deputy Secretary-General budget control over pooled coordination funds ($50-100m/yr) and authority to mediate inter-agency disputes, and delegate Resident Coordinators real authority to resolve programming conflicts — not just convene."],

 ["G16","Propose a UN Development Charter","coord",2,"WS3","tt","New",GUNG,null,false,"Propose a voluntary UN Development Charter: entities commit to joint country-level programming, shared back-office functions, RC coordination authority and coordination reporting, in exchange for donors providing at least 25% core funding to signatories — incentives, not hierarchy."],

const EXTERNAL=EXT_RAW.map(r=>({id:r[0],name:r[1],theme:r[2],lvl:r[3],ws:r[4],src:r[5],stance:r[6],by:r[7],wp:r[8],adj:r[9],desc:r[10]}));

/* ===== GEOMETRY ===== */
const C=500,MAXR=420,HOLE=78,SECT=360/THEMES.length;
const d2r=d=>d*Math.PI/180;
const polar=(r,d)=>({x:C+r*Math.cos(d2r(d)),y:C+r*Math.sin(d2r(d))});
const band=lvl=>HOLE+(MAXR-HOLE)*(lvl-0.5)/4;
const avg=a=>a.reduce((x,y)=>x+y,0)/a.length;
function donut(rO,rI){
  const o=polar(rO,0),o2=polar(rO,180),i=polar(rI,0),i2=polar(rI,180);
  return `M${o.x} ${o.y} A${rO} ${rO} 0 1 1 ${o2.x} ${o2.y} A${rO} ${rO} 0 1 1 ${o.x} ${o.y} Z `+
         `M${i.x} ${i.y} A${rI} ${rI} 0 1 0 ${i2.x} ${i2.y} A${rI} ${rI} 0 1 0 ${i.x} ${i.y} Z`;
}
function arc(r,a0,a1){const s=polar(r,a0),e=polar(r,a1);const large=(a1-a0)>180?1:0;return `M${s.x} ${s.y} A${r} ${r} 0 ${large} 1 ${e.x} ${e.y}`;}

function computeLayout(items,view){
  const blips=[],dividers=[],wpLabels=[];
  const BW=(MAXR-HOLE)/4;
  THEMES.forEach((theme,ti)=>{
    const ti0=-90+ti*SECT, M=SECT*0.10, arc0=ti0+M, arcW=SECT-2*M;
    const secLo=ti0+2, secHi=ti0+SECT-2;
    const rb=r=>({rLo:Math.max(HOLE+14,r-BW*0.7),rHi:Math.min(MAXR-8,r+BW*0.7)});
    const mine=items.filter(it=>it.theme===theme.id);
    if(!mine.length)return;
    const byWp=new Map();
    mine.filter(i=>i.src==="un80").forEach(a=>{if(!byWp.has(a.wp))byWp.set(a.wp,[]);byWp.get(a.wp).push(a);});
    const groups=[...byWp.keys()].sort((a,b)=>a-b).map(wp=>({wp,items:byWp.get(wp)}));
    mine.filter(i=>i.src!=="un80").forEach(x=>groups.push({ext:x,items:[x]}));
    const counts=groups.map(g=>g.items.length), total=counts.reduce((a,b)=>a+b,0);
    const minW=arcW*0.045;
    let widths=counts.map(c=>Math.max(arcW*c/total,minW));
    const wsum=widths.reduce((a,b)=>a+b,0); widths=widths.map(w=>w*arcW/wsum);
    let cur=arc0;
    groups.forEach((g,gi)=>{
      const w=widths[gi], gStart=cur, gMid=cur+w/2; cur+=w;
      if(view==="actions" && gi>0) dividers.push({theme:theme.id,ang:gStart});
      if(view==="packages"){
        if(g.wp!=null){
          const mean=avg(g.items.map(a=>a.lvl)), r=HOLE+(MAXR-HOLE)*(mean-0.5)/4, p=polar(r,gMid);
          blips.push({kind:"wp",id:"wp"+g.wp,wp:g.wp,theme:theme.id,wpName:WP[g.wp][0],leads:WP[g.wp][1],src:"un80",stance:"official",acts:g.items,count:g.items.length,lvl:Math.round(mean),ang:gMid,r,x:p.x,y:p.y,size:9+Math.min(9,g.items.length),secLo,secHi,...rb(r)});
        } else {const it=g.ext,r=band(it.lvl),p=polar(r,gMid);blips.push({...it,kind:"ext",count:1,ang:gMid,r,x:p.x,y:p.y,size:10,secLo,secHi,...rb(r)});}
      } else {
        const arr=g.items.slice().sort((a,b)=>a.lvl-b.lvl||(a.n||0)-(b.n||0)), N=arr.length;
        arr.forEach((a,j)=>{
          const ang=N===1?gMid:gStart+w*(0.12+0.76*(j/(N-1||1)));
          const r=band(a.lvl)+((j%2)?7:-7), p=polar(r,ang);
          if(a.src==="un80")blips.push({...a,kind:"action",count:1,ang,r,x:p.x,y:p.y,size:8.5,secLo,secHi,...rb(r)});
          else blips.push({...a,kind:"ext",count:1,ang,r,x:p.x,y:p.y,size:9.5,secLo,secHi,...rb(r)});
        });
        if(g.wp!=null){const lp=polar(MAXR-14,gMid);wpLabels.push({x:lp.x,y:lp.y,text:g.wp});}
      }
    });
  });
  // collision relaxation — keep each contact inside its sector & near its level band
  const clampAng=(a,lo,hi)=>{let v=a;while(v<lo)v+=360;while(v>=lo+360)v-=360;if(v>hi)v=(v-hi)<((lo+360)-v)?hi:lo;return v;};
  for(let it=0;it<160;it++){
    let moved=false;
    for(let i=0;i<blips.length;i++)for(let j=i+1;j<blips.length;j++){
      const a=blips[i],b=blips[j];let dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)||0.01;
      const min=a.size+b.size+8;
      if(d<min){const push=(min-d)/2,ux=dx/d,uy=dy/d;a.x-=ux*push;a.y-=uy*push;b.x+=ux*push;b.y+=uy*push;moved=true;}
    }
    for(const p of blips){
      let ang=Math.atan2(p.y-C,p.x-C)*180/Math.PI, r=Math.hypot(p.x-C,p.y-C);
      ang=clampAng(ang,p.secLo,p.secHi); r=Math.max(p.rLo,Math.min(p.rHi,r));
      const pp=polar(r,ang);p.x=pp.x;p.y=pp.y;p.ang=ang;p.r=r;
    }
    if(!moved)break;
  }
  return {blips,dividers,wpLabels};
}

/* ===== MARKERS (all circular; FILL = stance, RING = source) ===== */
function Rings({ring,r,color}){const c=color||RING_HEX;
  if(ring==="solid")  return <circle r={r+3} fill="none" stroke={c} strokeWidth="1.6" opacity=".95"/>;
  if(ring==="dashed") return <circle r={r+3} fill="none" stroke={c} strokeWidth="1.7" strokeDasharray="2.4 2.4" opacity=".95"/>;
  if(ring==="double") return <g><circle r={r+2.5} fill="none" stroke={c} strokeWidth="1.3" opacity=".95"/><circle r={r+5.2} fill="none" stroke={c} strokeWidth="1.2" opacity=".7"/></g>;
  return null;
}
function Dot({src,s}){const z=s||7;const sc=SOURCES[src]||SOURCES.un80;
  return <g><circle r={z} fill={SWATCH_FILL} stroke="#0a2236" strokeWidth="1"/><Rings ring={sc.ring} r={z}/></g>;}

/* ===== SONAR ===== */
function Sonar({layout,view,activeSector,onPick,selected,reduced,sweepOn}){
  const sweepRef=useRef(null),glow=useRef({}),aRef=useRef(-90),svgRef=useRef(null);
  const [hover,setHover]=useState(null);
  const {blips,dividers,wpLabels}=layout;
  // pan + zoom (viewBox driven)
  const BV={x:-57,y:3,w:1114,h:994};const ASP=BV.h/BV.w;const MINW=BV.w/4.5;
  const [vb,setVb]=useState(BV);const vbRef=useRef(vb);useEffect(()=>{vbRef.current=vb;},[vb]);
  const drag=useRef(null);
  const cl=(v,lo,hi)=>Math.min(hi,Math.max(lo,v));
  function zoomAt(px,py,f){const v=vbRef.current;let nw=cl(v.w*f,MINW,BV.w),nh=nw*ASP;
    const rx=(px-v.x)/v.w,ry=(py-v.y)/v.h;let nx=cl(px-rx*nw,BV.x,BV.x+BV.w-nw),ny=cl(py-ry*nh,BV.y,BV.y+BV.h-nh);
    setVb({x:nx,y:ny,w:nw,h:nh});}
  const zoomBtn=f=>{const v=vbRef.current;zoomAt(v.x+v.w/2,v.y+v.h/2,f);};
  const resetZoom=()=>setVb(BV);
  useEffect(()=>{const el=svgRef.current;if(!el)return;
    const onWheel=e=>{e.preventDefault();const v=vbRef.current,r=el.getBoundingClientRect();
      const px=v.x+((e.clientX-r.left)/r.width)*v.w,py=v.y+((e.clientY-r.top)/r.height)*v.h;
      zoomAt(px,py,e.deltaY<0?1/1.18:1.18);};
    el.addEventListener("wheel",onWheel,{passive:false});return ()=>el.removeEventListener("wheel",onWheel);
  },[]);
  // zoom into a sector when one is focused; reset when cleared
  useEffect(()=>{
    if(!activeSector){setVb(BV);return;}
    const i=THEMES.findIndex(t=>t.id===activeSector);if(i<0){setVb(BV);return;}
    const a0=-90+i*SECT,a1=-90+(i+1)*SECT,RR=MAXR+46;
    const pts=[[C,C]];for(let a=a0;a<=a1+0.01;a+=SECT/16){const p=polar(RR,a);pts.push([p.x,p.y]);}
    let minx=Math.min(...pts.map(p=>p[0])),maxx=Math.max(...pts.map(p=>p[0])),miny=Math.min(...pts.map(p=>p[1])),maxy=Math.max(...pts.map(p=>p[1]));
    const pad=34;minx-=pad;maxx+=pad;miny-=pad;maxy+=pad;
    let w=maxx-minx,h=maxy-miny;const want=BV.w/BV.h;
    if(w/h<want){const nw=h*want;minx-=(nw-w)/2;w=nw;}else{const nh=w/want;miny-=(nh-h)/2;h=nh;}
    w=Math.min(w,BV.w);h=Math.min(h,BV.h);
    setVb({x:cl(minx,BV.x,BV.x+BV.w-w),y:cl(miny,BV.y,BV.y+BV.h-h),w,h});
  },[activeSector]);
  function onDown(e){const v=vbRef.current;if(v.w>=BV.w)return;const r=svgRef.current.getBoundingClientRect();
    drag.current={sx:e.clientX,sy:e.clientY,vx:v.x,vy:v.y,w:v.w,h:v.h,rw:r.width,rh:r.height,moved:false,pid:e.pointerId};}
  function onMove(e){const d=drag.current;if(!d)return;
    if(!d.moved){if(Math.hypot(e.clientX-d.sx,e.clientY-d.sy)<4)return;d.moved=true;try{svgRef.current.setPointerCapture(d.pid);}catch(_){}}
    e.preventDefault();
    const dx=(e.clientX-d.sx)/d.rw*d.w,dy=(e.clientY-d.sy)/d.rh*d.h;
    setVb({x:cl(d.vx-dx,BV.x,BV.x+BV.w-d.w),y:cl(d.vy-dy,BV.y,BV.y+BV.h-d.h),w:d.w,h:d.h});}
  function onUp(){const d=drag.current;if(d&&d.moved){try{svgRef.current.releasePointerCapture(d.pid);}catch(_){}}drag.current=null;}
  const zoomed=vb.w<BV.w-1;
  useEffect(()=>{
    if(reduced||!sweepOn){Object.values(glow.current).forEach(el=>{if(el)el.setAttribute("opacity","0.26");});return;}
    let raf,last=performance.now();
    const frame=now=>{const dt=(now-last)/1000;last=now;let a=aRef.current+44*dt;if(a>=270)a-=360;aRef.current=a;
      if(sweepRef.current)sweepRef.current.setAttribute("transform",`rotate(${a} ${C} ${C})`);
      for(const b of blips){const el=glow.current[b.id];if(!el)continue;
        const d=((a-b.ang)%360+360)%360,inten=d<150?Math.pow(1-d/150,1.7):0;
        const dim=(activeSector&&b.theme!==activeSector)?0.1:1;
        el.setAttribute("opacity",(inten*0.8*dim).toFixed(3));}
      raf=requestAnimationFrame(frame);};
    raf=requestAnimationFrame(frame);return ()=>cancelAnimationFrame(raf);
  },[blips,reduced,sweepOn,activeSector]);

  const rings=[1,2,3,4].map(l=>HOLE+(MAXR-HOLE)*l/4);
  const bandFill=["rgba(80,160,230,.05)","rgba(70,200,180,.06)","rgba(245,180,90,.07)","rgba(240,110,110,.11)"];
  const themeCount=id=>blips.filter(b=>b.theme===id).reduce((s,b)=>s+(b.count||1),0);
  let connector=null;
  if(selected&&selected.kind==="ext"&&selected.wp&&view==="packages"){
    const src=blips.find(b=>b.id===selected.id), tgt=blips.find(b=>b.kind==="wp"&&b.wp===selected.wp);
    if(src&&tgt)connector={src,tgt,color:(STANCE[selected.stance]||STANCE.New).color,adj:selected.adj};
  }

  const zbtn={width:34,height:34,borderRadius:9,border:"1px solid rgba(130,165,190,.3)",background:"rgba(8,28,46,.82)",color:"#dDEAF5",fontSize:17,fontWeight:700,cursor:"pointer",display:"grid",placeItems:"center",backdropFilter:"blur(6px)",WebkitBackdropFilter:"blur(6px)",lineHeight:1};
  return (
    <div style={{position:"relative",width:"100%",height:"100%"}}>
    <svg ref={svgRef} viewBox={`${vb.x} ${vb.y} ${vb.w} ${vb.h}`} width="100%" height="100%" role="img" preserveAspectRatio="xMidYMid meet"
      onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} onPointerLeave={onUp}
      style={{display:"block",cursor:zoomed?(drag.current&&drag.current.moved?"grabbing":"grab"):"default",touchAction:"none",userSelect:"none",WebkitUserSelect:"none"}}
      aria-label="Sonar of UN reform actions. Angle is the theme; distance from the centre is the degree of change, from incremental at the centre to dissolution at the rim.">
      <defs>
        <radialGradient id="screen" cx="50%" cy="50%" r="65%"><stop offset="0%" stopColor="#0E3A5C"/><stop offset="58%" stopColor="#082B47"/><stop offset="100%" stopColor="#05192B"/></radialGradient>
        <radialGradient id="vig" cx="50%" cy="50%" r="50%"><stop offset="78%" stopColor="#000" stopOpacity="0"/><stop offset="100%" stopColor="#000" stopOpacity="0.45"/></radialGradient>
        <radialGradient id="blipUN" cx="38%" cy="34%" r="75%"><stop offset="0%" stopColor="#D6F2FF"/><stop offset="45%" stopColor="#5FC0EE"/><stop offset="100%" stopColor="#2A7FB8"/></radialGradient>
        <radialGradient id="sweepGrad"><stop offset="0%" stopColor="#8FD2F5" stopOpacity="0"/><stop offset="72%" stopColor="#4FB4E8" stopOpacity="0.05"/><stop offset="100%" stopColor="#9FE0FF" stopOpacity="0.30"/></radialGradient>
        <filter id="soft"><feGaussianBlur stdDeviation="3.4"/></filter>
      </defs>

      <circle cx={C} cy={C} r={MAXR+62} fill="#03101D"/>
      <circle cx={C} cy={C} r={MAXR} fill="url(#screen)"/>
      {bandFill.map((f,i)=><path key={i} d={donut(rings[i],i===0?HOLE:rings[i-1])} fill={f} fillRule="evenodd"/>)}

      {/* crosshair */}
      <line x1={C-MAXR} y1={C} x2={C+MAXR} y2={C} stroke="rgba(127,196,240,.10)"/>
      <line x1={C} y1={C-MAXR} x2={C} y2={C+MAXR} stroke="rgba(127,196,240,.10)"/>
      {/* degree ticks */}
      {Array.from({length:72}).map((_,i)=>{const a=i*5,inner=i%6===0?MAXR-14:MAXR-7,o=polar(MAXR,a),n=polar(inner,a);return <line key={i} x1={o.x} y1={o.y} x2={n.x} y2={n.y} stroke="rgba(127,196,240,.18)" strokeWidth={i%6===0?1.3:.7}/>;})}
      {/* range rings */}
      {rings.map((r,i)=><circle key={i} cx={C} cy={C} r={r} fill="none" stroke={i===3?"rgba(127,196,240,.32)":"rgba(127,196,240,.14)"} strokeWidth={i===3?1.5:1}/>)}
      <circle cx={C} cy={C} r={HOLE} fill="none" stroke="rgba(127,196,240,.22)"/>

      {/* sector spokes + active wedge */}
      {THEMES.map((t,i)=>{const a0=-90+i*SECT,p=polar(MAXR,a0),act=activeSector===t.id;
        const s=polar(MAXR,a0),e=polar(MAXR,a0+SECT);
        return <g key={t.id}>{act&&<path d={`M${C} ${C} L${s.x} ${s.y} A${MAXR} ${MAXR} 0 0 1 ${e.x} ${e.y} Z`} fill={t.color} opacity="0.08"/>}
          <line x1={C} y1={C} x2={p.x} y2={p.y} stroke={act?"rgba(127,196,240,.4)":"rgba(127,196,240,.12)"}/></g>;})}

      {/* WP cluster dividers (action view) */}
      {dividers.map((d,i)=>{const s=polar(HOLE,d.ang),e=polar(MAXR,d.ang);return <line key={i} x1={s.x} y1={s.y} x2={e.x} y2={e.y} stroke="rgba(127,196,240,.07)"/>;})}

      {/* theme bezel arcs + labels */}
      {THEMES.map((t,i)=>{const a0=-90+i*SECT+1.4,a1=-90+(i+1)*SECT-1.4,mid=-90+i*SECT+SECT/2;
        const lp=polar(MAXR+34,mid),anchor=lp.x>C+8?"start":lp.x<C-8?"end":"middle",act=activeSector===t.id;
        const cp=polar(MAXR+34,mid);
        return <g key={t.id} style={{cursor:"pointer"}} onClick={()=>onPick&&onPick({sector:t.id})}>
          <path d={arc(MAXR+9,a0,a1)} fill="none" stroke={t.color} strokeWidth={act?7:4.5} strokeLinecap="round" opacity={act?1:.82}/>
          <text x={lp.x} y={cp.y-5} textAnchor={anchor} dominantBaseline="middle" style={{fontFamily:"var(--font-body)",fontSize:16,fontWeight:700,fill:act?t.color:"#BcdCEC"}}>{t.short}</text>
          <text x={lp.x} y={cp.y+12} textAnchor={anchor} className="mono" style={{fontSize:11,fill:"rgba(173,210,225,.6)"}}>{themeCount(t.id)}</text>
        </g>;})}

      {/* range labels re-rendered above blips below */}

      {/* sweep */}
      <g ref={sweepRef} transform={`rotate(-90 ${C} ${C})`} style={{pointerEvents:"none"}}>
        {!reduced&&sweepOn&&<path d={`M${C} ${C} L${C+MAXR} ${C} A${MAXR} ${MAXR} 0 0 1 ${C+MAXR*Math.cos(d2r(-46))} ${C+MAXR*Math.sin(d2r(-46))} Z`} fill="url(#sweepGrad)"/>}
        {!reduced&&sweepOn&&<line x1={C} y1={C} x2={C+MAXR} y2={C} stroke="#A6E0FF" strokeWidth="1.6" opacity="0.8"/>}
      </g>

      {/* centre reticle */}
      <circle cx={C} cy={C} r={HOLE-2} fill="#06243B" stroke="rgba(127,196,240,.28)"/>
      <circle cx={C} cy={C} r={HOLE-12} fill="none" stroke="rgba(127,196,240,.16)"/>
      <text x={C} y={C-5} textAnchor="middle" className="mono" style={{fontSize:12.5,fill:"#8FD2F5",letterSpacing:".05em"}}>STATUS QUO</text>
      <text x={C} y={C+13} textAnchor="middle" className="mono" style={{fontSize:8.5,fill:"rgba(173,210,225,.6)",letterSpacing:".16em"}}>CENTRE</text>

      {/* WP numbers (action view) */}
      {wpLabels.map((l,i)=><text key={i} x={l.x} y={l.y} textAnchor="middle" dominantBaseline="middle" className="mono" style={{fontSize:9.5,fill:"rgba(190,224,240,.42)"}}>{l.text}</text>)}

      {/* connector: external proposal → targeted work package */}
      {connector&&<g style={{pointerEvents:"none"}}>
        <circle cx={connector.tgt.x} cy={connector.tgt.y} r={connector.tgt.size+7} fill="none" stroke={connector.color} strokeWidth="2" opacity=".9"/>
        <line x1={connector.src.x} y1={connector.src.y} x2={connector.tgt.x} y2={connector.tgt.y} stroke={connector.color} strokeWidth="2" strokeDasharray={connector.adj?"2 6":"7 5"} opacity=".85"/>
      </g>}

      {/* blips — selected & hovered drawn last so they lift above neighbours */}
      {[...blips].sort((a,b)=>{
        const rank=x=>(selected&&selected.id===x.id)?2:(hover===x.id?1:0);
        return rank(a)-rank(b);
      }).map(b=>{const sc=SOURCES[b.src]||SOURCES.un80;const fc=fillOf(b);
        const sel=selected&&selected.id===b.id;const hot=hover===b.id;const ext=b.kind==="ext";
        const dim=(activeSector&&b.theme!==activeSector&&!sel&&!hot)?0.14:1;
        const scale=(sel||hot)?1.42:1;const hit=Math.max(b.size+11,16);
        return <g key={b.id} transform={`translate(${b.x} ${b.y})`} style={{cursor:"pointer"}} tabIndex={0} role="button"
            aria-label={`${b.name||b.wpName}. ${sc.label}. ${(STANCE[b.stance]||STANCE.New).label}. ${LEVELS[(b.lvl||1)-1].label}.`}
            onClick={e=>{e.stopPropagation();onPick&&onPick({blip:b});}}
            onMouseEnter={()=>setHover(b.id)} onMouseLeave={()=>setHover(h=>h===b.id?null:h)}
            onFocus={()=>setHover(b.id)} onBlur={()=>setHover(h=>h===b.id?null:h)}
            onKeyDown={e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();onPick&&onPick({blip:b});}}}>
          <title>{b.name||b.wpName}</title>
          {/* generous invisible hit target */}
          <circle r={hit} fill="transparent"/>
          {ext&&<circle r={b.size+7} fill={fc} opacity={dim*0.22} filter="url(#soft)"/>}
          <circle ref={el=>glow.current[b.id]=el} r={b.size+9} fill={ext?fc:"#4FB4E8"} opacity="0" filter="url(#soft)"/>
          <g opacity={dim} style={{transform:`scale(${scale})`,transition:"transform .12s ease"}}>
            {ext
              ? <g><circle r={b.size} fill={fc} stroke="#06223a" strokeWidth="1"/><Rings ring={sc.ring} r={b.size}/></g>
              : <g><circle r={b.size} fill="url(#blipUN)"/><circle r={b.size} fill="none" stroke="#CDEEFF" strokeWidth="1" opacity=".7"/>
                {b.kind==="wp"&&<text textAnchor="middle" dominantBaseline="central" className="mono" style={{fontSize:b.size*0.85,fill:"#05233A",fontWeight:700,pointerEvents:"none"}}>{b.count}</text>}</g>}
          </g>
          {sel&&[[-1,-1],[1,-1],[-1,1],[1,1]].map((c,i)=>{const d=b.size+10,L=6;return <path key={i} d={`M${c[0]*d} ${c[1]*(d-L)} L${c[0]*d} ${c[1]*d} L${c[0]*(d-L)} ${c[1]*d}`} fill="none" stroke="#fff" strokeWidth="2"/>;})}
        </g>;})}

      {/* degree-of-change ring markers: small numerals up the top axis (full key is in the sidebar) */}
      {LEVELS.map((lv,i)=>{const r=HOLE+(MAXR-HOLE)*(i+0.5)/4;const y=C-r;const c=["#7FB8E8","#5FD0C4","#F5C06A","#F47E7E"][i];
        return <g key={lv.v} style={{pointerEvents:"none"}}>
          <circle cx={C} cy={y} r={9} fill="#04263F" stroke={c} strokeWidth="1.2" opacity=".92"/>
          <text x={C} y={y+0.5} textAnchor="middle" dominantBaseline="middle" className="mono" style={{fontSize:11,fontWeight:700,fill:c}}>{lv.v}</text>
        </g>;})}

      <circle cx={C} cy={C} r={MAXR} fill="url(#vig)" style={{pointerEvents:"none"}}/>
    </svg>
    <div style={{position:"absolute",left:30,bottom:28,display:"flex",flexDirection:"column",gap:6,zIndex:25}}>
      <button onClick={()=>zoomBtn(1/1.35)} aria-label="Zoom in" title="Zoom in" style={zbtn}>+</button>
      <button onClick={()=>zoomBtn(1.35)} aria-label="Zoom out" title="Zoom out" style={zbtn}>−</button>
      <button onClick={resetZoom} aria-label="Reset zoom" title="Reset zoom" disabled={!zoomed} style={{...zbtn,fontSize:13,opacity:zoomed?1:.4,cursor:zoomed?"pointer":"default"}}>⤢</button>
    </div>
    </div>
  );
}

/* ===== UI ===== */
const lbl={fontSize:11,fontWeight:600,letterSpacing:".07em",textTransform:"uppercase",color:"var(--text-2)"};
const card={background:"var(--surface-card)",border:"1px solid var(--border)",borderRadius:12,padding:16};
function Sw({src}){return <svg width="24" height="24" viewBox="-12 -12 24 24" aria-hidden="true"><Dot src={src} s={6}/></svg>;}

function ReadKey({dark,srcFilter,onSolo,onAll,allOn}){
  const tx=dark?"#E6F1FA":"var(--text-1)",tx2=dark?"#A6C0D4":"var(--text-2)",tx3=dark?"#7E97AC":"var(--text-3)";
  const box=dark
    ?{position:"absolute",right:30,bottom:28,width:230,maxWidth:"42%",background:"rgba(7,26,43,.84)",backdropFilter:"blur(7px)",WebkitBackdropFilter:"blur(7px)",border:"1px solid rgba(125,160,185,.28)",borderRadius:12,padding:"12px 14px",zIndex:24,boxShadow:"0 10px 30px rgba(0,0,0,.35)"}
    :{...card};
  const chip=on=>({display:"inline-flex",alignItems:"center",gap:6,padding:"4px 9px",borderRadius:999,fontSize:11.5,fontWeight:on?700:500,cursor:"pointer",color:tx,
    border:on?(dark?"1.5px solid #6FB3E6":"1.5px solid var(--blue-500)"):(dark?"1px solid rgba(150,175,195,.3)":"1px solid var(--border)"),
    background:on?(dark?"rgba(79,180,232,.18)":"var(--blue-50)"):(dark?"rgba(255,255,255,.05)":"#fff")});
  const lab=k=>k==="un80"?"UN80":k==="ms"?"Member State":k==="cso"?"Civil society":"Think tank";
  return <div style={box}>
    <div style={{...lbl,color:tx2,marginBottom:8}}>How to read it</div>
    <div style={{fontSize:11.5,fontWeight:700,color:tx,marginBottom:6}}>Distance from centre · degree of change</div>
    <div style={{display:"flex",flexDirection:"column",gap:3,marginBottom:7}}>{LEVELS.map((l,i)=><div key={l.v} style={{display:"flex",gap:8,alignItems:"center",fontSize:12,color:tx}}><span className="mono" style={{width:15,height:15,borderRadius:"50%",display:"grid",placeItems:"center",fontSize:9.5,fontWeight:700,color:"#fff",background:["#7FB8E8","#5FD0C4","#F5C06A","#F47E7E"][i],flexShrink:0}}>{l.v}</span>{l.label}</div>)}</div>
    <div style={{fontSize:10.5,color:tx3,marginBottom:10,lineHeight:1.4}}>Centre = status quo · rim = take it apart.</div>
    <div style={{fontSize:11.5,fontWeight:700,color:tx,marginBottom:6}}>Ring · source <span style={{fontWeight:400,color:tx3}}>· click to spotlight</span></div>
    <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
      <button onClick={onAll} style={chip(allOn)}>All</button>
      {Object.entries(SOURCES).map(([k])=><button key={k} onClick={()=>onSolo(k)} style={chip(srcFilter.has(k)&&!allOn)}><Sw src={k}/>{lab(k)}</button>)}
    </div>
  </div>;
}
function Chip({active,color,onClick,children}){return <button onClick={onClick} style={{display:"inline-flex",alignItems:"center",gap:7,padding:"6px 11px",borderRadius:999,border:active?`1.5px solid ${color}`:"1px solid var(--border)",background:active?"var(--blue-50)":"#fff",color:"var(--text-1)",fontSize:13,fontWeight:active?700:500}}><span style={{width:9,height:9,borderRadius:2,background:color,flexShrink:0}}/>{children}</button>;}

function Detail({blip,allItems,onClose,onEdit,onJumpToWp,onJumpToExt,onBack,canBack,cluster,onCycle,onShowSources}){
  if(!blip)return null;
  const sc=SOURCES[blip.src]||SOURCES.un80,th=themeById(blip.theme),lv=LEVELS[(blip.lvl||1)-1];
  const isUN=blip.src==="un80";
  const title=blip.kind==="wp"?`WP#${blip.wp} — ${blip.wpName}`:blip.name;
  // external proposals attached to this UN80 work package
  const related=isUN?allItems.filter(i=>i.src!=="un80"&&i.wp===blip.wp):[];
  const endorse=related.filter(i=>i.stance==="Endorse");
  const oppose =related.filter(i=>i.stance==="Oppose");
  const other  =related.filter(i=>i.stance!=="Endorse"&&i.stance!=="Oppose");
  const chip={display:"inline-flex",alignItems:"center",gap:6,padding:"4px 10px",borderRadius:7,fontSize:12.5,fontWeight:600,cursor:"pointer"};
  const ExtRow=x=>{const xc=(STANCE[x.stance]||STANCE.New).color;return (
    <button key={x.id} onClick={()=>onJumpToExt(x.id)} style={{display:"flex",gap:9,alignItems:"flex-start",width:"100%",textAlign:"left",padding:"8px 9px",borderRadius:8,border:"1px solid var(--border)",background:"#fff",cursor:"pointer"}}>
      <span style={{width:9,height:9,borderRadius:2,background:xc,marginTop:4,flexShrink:0}}/>
      <span style={{flex:1}}><span style={{fontSize:13,fontWeight:600,color:"var(--text-1)",display:"block",lineHeight:1.3}}>{x.name}</span>
        <span style={{fontSize:11.5,color:"var(--text-2)"}}>{(STANCE[x.stance]||{}).label} · {x.by}</span></span>
      <span aria-hidden="true" style={{color:"var(--blue-500)",fontSize:15,marginTop:1}}>→</span>
    </button>);};
  return (<div role="dialog" aria-label={title} style={{position:"absolute",top:0,right:0,height:"100%",width:"min(380px,92%)",background:"var(--surface-card)",borderLeft:"1px solid var(--border)",boxShadow:"-8px 0 28px rgba(10,47,78,.12)",zIndex:40,display:"flex",flexDirection:"column"}}>
    {canBack&&<button onClick={onBack} style={{display:"flex",alignItems:"center",gap:6,padding:"9px 18px",border:"none",borderBottom:"1px solid var(--border-subtle)",background:"var(--blue-50)",color:"var(--blue-600)",fontWeight:600,fontSize:12.5,textAlign:"left",cursor:"pointer"}}>← Back</button>}
    {cluster&&cluster.len>1&&<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,padding:"8px 18px",borderBottom:"1px solid var(--border-subtle)",background:"#FFF8E8"}}>
      <span style={{fontSize:12,color:"var(--text-2)"}}>Contact <b>{cluster.pos}</b> of <b>{cluster.len}</b> stacked here</span>
      <button onClick={onCycle} style={{...chip,border:"1px solid var(--border)",background:"#fff",color:"var(--blue-600)"}}>Next ›</button>
    </div>}
    <div style={{padding:"16px 18px",borderBottom:"1px solid var(--border-subtle)",display:"flex",gap:12,alignItems:"flex-start"}}>
      <Sw src={blip.src}/>
      <div style={{flex:1}}><h2 style={{fontSize:16.5,fontWeight:700,lineHeight:1.3,color:"var(--blue-800)"}}>{title}</h2>
        <p style={{fontSize:12.5,color:"var(--text-2)",marginTop:2}}>{sc.label}{blip.kind==="action"?` · action ${blip.n}`:blip.kind==="wp"?` · ${blip.count} actions`:""}</p></div>
      <button onClick={onClose} aria-label="Close" style={{background:"none",border:"none",fontSize:20,color:"var(--text-2)",lineHeight:1,cursor:"pointer"}}>✕</button>
    </div>
    <div style={{padding:"14px 18px",overflowY:"auto",flex:1}}>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
        <span style={{...lbl,padding:"4px 9px",borderRadius:6,background:"var(--blue-50)",border:`1px solid ${th.color}55`,color:"var(--text-1)"}}>{th.full}</span>
        <span style={{...lbl,padding:"4px 9px",borderRadius:6,background:"var(--blue-50)",border:"1px solid var(--border)",color:"var(--text-1)"}}>{lv.v}· {lv.label}</span>
        {blip.ws&&<span style={{...lbl,padding:"4px 9px",borderRadius:6,background:"var(--blue-50)",border:"1px solid var(--border)",color:"var(--text-1)"}}>{wsFull(blip.ws)}</span>}
        {blip.stance&&STANCE[blip.stance]&&<span style={{...lbl,padding:"4px 9px",borderRadius:6,background:STANCE[blip.stance].color+"22",border:`1px solid ${STANCE[blip.stance].color}`,color:"var(--text-1)"}}>{STANCE[blip.stance].label}</span>}
      </div>
      {blip.leads&&<p style={{fontSize:12,color:"var(--text-2)",marginBottom:10}}><span style={{...lbl,display:"block",marginBottom:2}}>Leads</span><span className="mono" style={{fontSize:11}}>{blip.leads}</span></p>}
      {blip.by&&<p style={{fontSize:12,color:"var(--text-2)",marginBottom:10}}><span style={{...lbl,display:"block",marginBottom:2}}>Source</span>{blip.by}</p>}
      {blip.kind==="ext"&&blip.wp&&<div style={{marginBottom:12}}><span style={{...lbl,display:"block",marginBottom:5}}>Relates to</span>
        <button onClick={()=>onJumpToWp(blip.wp)} style={{...chip,border:"1px solid var(--blue-300)",background:"var(--blue-50)",color:"var(--blue-700)"}}>
          WP#{blip.wp} · {WP[blip.wp]?WP[blip.wp][0]:""} <span aria-hidden="true">→</span></button>
        <p style={{fontSize:11.5,color:"var(--text-3)",marginTop:5}}>{blip.adj?"Adjacent — feeds into this work package.":"Direct target of this proposal."} Click to jump to it.</p></div>}
      {blip.desc&&<p style={{fontSize:14,lineHeight:1.6,color:"var(--text-1)"}}>{blip.desc}</p>}

      {isUN&&related.length>0&&<div style={{marginTop:16,paddingTop:14,borderTop:"1px solid var(--border-subtle)"}}>
        <p style={{...lbl,marginBottom:8}}>External positions on this work package</p>
        {endorse.length>0&&<div style={{marginBottom:10}}><div style={{fontSize:12,fontWeight:700,color:"#5a9e2e",marginBottom:5}}>Endorses ({endorse.length})</div><div style={{display:"flex",flexDirection:"column",gap:6}}>{endorse.map(ExtRow)}</div></div>}
        {oppose.length>0&&<div style={{marginBottom:10}}><div style={{fontSize:12,fontWeight:700,color:"#d24545",marginBottom:5}}>Opposes ({oppose.length})</div><div style={{display:"flex",flexDirection:"column",gap:6}}>{oppose.map(ExtRow)}</div></div>}
        {other.length>0&&<div><div style={{fontSize:12,fontWeight:700,color:"var(--text-2)",marginBottom:5}}>Related ({other.length})</div><div style={{display:"flex",flexDirection:"column",gap:6}}>{other.map(ExtRow)}</div></div>}
      </div>}
      {isUN&&related.length===0&&<p style={{fontSize:12,color:"var(--text-3)",marginTop:14,paddingTop:12,borderTop:"1px solid var(--border-subtle)",fontStyle:"italic"}}>No external proposals in the radar target this work package yet.</p>}

      {blip.kind==="wp"&&blip.acts&&<div style={{marginTop:14}}><p style={{...lbl,marginBottom:8}}>Actions ({blip.acts.length})</p>
        <ul style={{listStyle:"none",display:"flex",flexDirection:"column",gap:8}}>{blip.acts.slice().sort((a,b)=>a.lvl-b.lvl).map(a=><li key={a.id} style={{fontSize:13,lineHeight:1.45,color:"var(--text-1)",paddingLeft:30,position:"relative"}}><span className="mono" style={{position:"absolute",left:0,top:1,color:th.color,fontSize:10.5}}>L{a.lvl}</span>{a.name}</li>)}</ul></div>}
    </div>
    <div style={{padding:"12px 18px",borderTop:"1px solid var(--border-subtle)",display:"flex",gap:8,flexDirection:"column"}}>
      {isUN&&<a href="https://un80actions.un.org/" target="_blank" rel="noopener noreferrer" style={{display:"block",textAlign:"center",padding:"9px",borderRadius:8,border:"1px solid var(--blue-300)",background:"var(--blue-50)",fontWeight:600,fontSize:13,color:"var(--blue-700)",textDecoration:"none"}}>View on un80actions.un.org →</a>}
      {!isUN&&<button onClick={()=>onShowSources&&onShowSources(blip.by)} style={{display:"block",width:"100%",textAlign:"center",padding:"9px",borderRadius:8,border:"1px solid var(--blue-300)",background:"var(--blue-50)",fontWeight:600,fontSize:13,color:"var(--blue-700)",cursor:"pointer"}}>View all sources →</button>}
      <button onClick={()=>onEdit(blip)} style={{width:"100%",padding:"9px",borderRadius:8,border:"1px solid var(--border)",background:"#fff",fontWeight:600,fontSize:13,color:"var(--blue-600)",cursor:"pointer"}}>Edit this item</button>
    </div>
  </div>);
}

function EditForm({draft,setDraft,onSave,onCancel,onDelete,isNew}){
  const set=(k,v)=>setDraft({...draft,[k]:v});
  return (<div role="dialog" aria-label={isNew?"Add proposal":"Edit item"} style={{position:"absolute",top:0,right:0,height:"100%",width:"min(380px,92%)",background:"var(--surface-card)",borderLeft:"1px solid var(--border)",boxShadow:"-8px 0 28px rgba(10,47,78,.12)",zIndex:50,display:"flex",flexDirection:"column"}}>
    <div style={{padding:"16px 18px",borderBottom:"1px solid var(--border-subtle)",display:"flex",justifyContent:"space-between",alignItems:"center"}}><h2 style={{fontSize:16,fontWeight:700,color:"var(--blue-800)"}}>{isNew?"Add a proposal":"Edit item"}</h2><button onClick={onCancel} aria-label="Close" style={{background:"none",border:"none",fontSize:20,color:"var(--text-2)"}}>✕</button></div>
    <div style={{padding:"14px 18px",overflowY:"auto",flex:1,display:"flex",flexDirection:"column",gap:14}}>
      <label><span style={{...lbl,display:"block",marginBottom:5}}>Name</span><input value={draft.name} onChange={e=>set("name",e.target.value)} placeholder="Short title" style={{width:"100%",padding:"9px 11px",borderRadius:8,border:"1px solid var(--border)",fontSize:14,fontFamily:"inherit"}}/></label>
      <div><span style={{...lbl,display:"block",marginBottom:6}}>Theme (sector)</span><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{THEMES.map(t=><button key={t.id} onClick={()=>set("theme",t.id)} style={{padding:"5px 9px",borderRadius:7,fontSize:12,fontWeight:draft.theme===t.id?700:500,border:draft.theme===t.id?`1.5px solid ${t.color}`:"1px solid var(--border)",background:draft.theme===t.id?"var(--blue-50)":"#fff",color:"var(--text-1)"}}>{t.short}</button>)}</div></div>
      <div><span style={{...lbl,display:"block",marginBottom:6}}>Workstream</span><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{WORKSTREAMS.map(w=><button key={w.id} onClick={()=>set("ws",w.id)} style={{padding:"5px 9px",borderRadius:7,fontSize:12,fontWeight:draft.ws===w.id?700:500,border:draft.ws===w.id?"1.5px solid var(--blue-500)":"1px solid var(--border)",background:draft.ws===w.id?"var(--blue-50)":"#fff",color:"var(--text-1)"}}>{w.short}</button>)}</div></div>
      <div><span style={{...lbl,display:"block",marginBottom:6}}>Source</span><div style={{display:"flex",flexDirection:"column",gap:5}}>{Object.entries(SOURCES).map(([k,s])=><button key={k} onClick={()=>set("src",k)} style={{display:"flex",alignItems:"center",gap:9,padding:"7px 9px",borderRadius:8,textAlign:"left",border:draft.src===k?`1.5px solid var(--blue-500)`:"1px solid var(--border)",background:draft.src===k?"var(--blue-50)":"#fff",fontSize:13,fontWeight:draft.src===k?700:500,color:"var(--text-1)"}}><Sw src={k}/>{s.label}</button>)}</div></div>
      <div><span style={{...lbl,display:"block",marginBottom:6}}>Stance toward UN80</span><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{STANCE_ORDER.filter(s=>s!=="official").map(s=><button key={s} onClick={()=>set("stance",s)} style={{display:"inline-flex",alignItems:"center",gap:6,padding:"5px 9px",borderRadius:7,fontSize:12,fontWeight:draft.stance===s?700:500,border:draft.stance===s?`1.5px solid ${STANCE[s].color}`:"1px solid var(--border)",background:draft.stance===s?"var(--blue-50)":"#fff",color:"var(--text-1)"}}><span style={{width:9,height:9,borderRadius:2,background:STANCE[s].color}}/>{STANCE[s].label}</button>)}</div></div>
      <div><span style={{...lbl,display:"block",marginBottom:6}}>Degree of change · centre → rim</span><div style={{display:"flex",flexDirection:"column",gap:5}}>{LEVELS.map(l=><button key={l.v} onClick={()=>set("lvl",l.v)} style={{padding:"7px 10px",borderRadius:8,textAlign:"left",border:draft.lvl===l.v?"1.5px solid var(--blue-500)":"1px solid var(--border)",background:draft.lvl===l.v?"var(--blue-50)":"#fff",color:"var(--text-1)"}}><span style={{fontSize:13,fontWeight:draft.lvl===l.v?700:600}}><span className="mono">{l.v}·</span> {l.label}</span><span style={{display:"block",fontSize:11.5,color:"var(--text-2)"}}>{l.desc}</span></button>)}</div></div>
      <label><span style={{...lbl,display:"block",marginBottom:5}}>Proposed by (optional)</span><input value={draft.by||""} onChange={e=>set("by",e.target.value)} placeholder="e.g. think tank, coalition, Member State" style={{width:"100%",padding:"9px 11px",borderRadius:8,border:"1px solid var(--border)",fontSize:13.5,fontFamily:"inherit"}}/></label>
      <label><span style={{...lbl,display:"block",marginBottom:5}}>Description</span><textarea value={draft.desc||""} onChange={e=>set("desc",e.target.value)} rows={4} placeholder="What is the idea?" style={{width:"100%",padding:"9px 11px",borderRadius:8,border:"1px solid var(--border)",fontSize:13.5,fontFamily:"inherit",resize:"vertical"}}/></label>
    </div>
    <div style={{padding:"12px 18px",borderTop:"1px solid var(--border-subtle)",display:"flex",gap:8}}>{!isNew&&<button onClick={onDelete} style={{padding:"9px 12px",borderRadius:8,border:"1px solid #F0A0A0",background:"#FDECEA",color:"#C13030",fontWeight:600,fontSize:13}}>Delete</button>}<div style={{flex:1}}/><button onClick={onCancel} style={{padding:"9px 14px",borderRadius:8,border:"1px solid var(--border)",background:"#fff",fontWeight:600,fontSize:13,color:"var(--text-1)"}}>Cancel</button><button onClick={onSave} disabled={!draft.name.trim()} style={{padding:"9px 16px",borderRadius:8,border:"none",background:draft.name.trim()?"var(--blue-500)":"#cdd4dc",color:"#fff",fontWeight:700,fontSize:13}}>{isNew?"Add":"Save"}</button></div>
  </div>);
}

/* ===== SOURCES PANEL ===== */
function SourcesPanel({docs,onClose,highlight}){
  return (<div onClick={onClose} style={{position:"absolute",inset:0,background:"rgba(6,29,48,.45)",zIndex:60,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div onClick={e=>e.stopPropagation()} role="dialog" aria-label="Source documents" style={{background:"var(--surface-card)",borderRadius:14,maxWidth:520,width:"100%",maxHeight:"82%",display:"flex",flexDirection:"column",boxShadow:"0 18px 50px rgba(6,29,48,.4)"}}>
      <div style={{padding:"16px 20px",borderBottom:"1px solid var(--border-subtle)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><h2 style={{fontFamily:"var(--font-display)",fontSize:19,fontWeight:900,color:"var(--blue-800)"}}>Where the external proposals come from</h2>
          <p style={{fontSize:12.5,color:"var(--text-2)",marginTop:3}}>{docs.length} source documents · {docs.reduce((s,d)=>s+d[1],0)} proposals</p></div>
        <button onClick={onClose} aria-label="Close" style={{background:"none",border:"none",fontSize:22,color:"var(--text-2)",cursor:"pointer"}}>✕</button>
      </div>
      <div style={{padding:"12px 20px",overflowY:"auto"}}>
        <ul style={{listStyle:"none",display:"flex",flexDirection:"column",gap:8}}>
          {docs.map(([name,n])=>{const hi=highlight&&name===highlight;const url=SOURCE_URLS[name];
            const inner=<React.Fragment>
              <span style={{flex:1,minWidth:0}}><span style={{fontSize:13.5,color:url?"var(--blue-700)":"var(--text-1)",lineHeight:1.4,fontWeight:hi?700:url?600:400}}>{name}</span>
                {hi&&<span style={{fontSize:11,color:"var(--blue-600)",fontWeight:600,marginLeft:6}}>· this proposal</span>}
                {url&&<span aria-hidden="true" style={{color:"var(--blue-500)",marginLeft:6}}>↗</span>}</span>
              <span className="mono" style={{fontSize:12,color:"var(--blue-600)",fontWeight:700,whiteSpace:"nowrap"}}>{n} {n===1?"proposal":"proposals"}</span>
            </React.Fragment>;
            const style={display:"flex",justifyContent:"space-between",gap:12,alignItems:"baseline",padding:"11px 12px",borderRadius:9,border:hi?"1.5px solid var(--blue-500)":"1px solid var(--border)",background:hi?"#fff":"var(--blue-50)",boxShadow:hi?"0 0 0 3px rgba(26,123,184,.12)":"none",textDecoration:"none"};
            return <li key={name}>{url
              ? <a href={url} target="_blank" rel="noopener noreferrer" style={style}>{inner}</a>
              : <div style={style}>{inner}</div>}</li>;})}
        </ul>
        <p style={{fontSize:11.5,color:"var(--text-3)",marginTop:12,lineHeight:1.5}}>UN80 official actions are sourced from the UN80 Initiative Action Plan and the live tracker at un80actions.un.org (linked on each UN80 contact's card).</p>
      </div>
    </div>
  </div>);
}

/* ===== DATA PANEL ===== */
function DataPanel({onExport,onImport,onTemplate,sweepOn,setSweepOn,onClose}){
  const btn={padding:"10px",borderRadius:9,border:"1px solid var(--border)",background:"#fff",fontSize:13.5,fontWeight:600,color:"var(--blue-600)",cursor:"pointer"};
  return (<div onClick={onClose} style={{position:"absolute",inset:0,background:"rgba(6,29,48,.45)",zIndex:60,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div onClick={e=>e.stopPropagation()} role="dialog" aria-label="Your data" style={{background:"var(--surface-card)",borderRadius:14,maxWidth:440,width:"100%",boxShadow:"0 18px 50px rgba(6,29,48,.4)"}}>
      <div style={{padding:"16px 20px",borderBottom:"1px solid var(--border-subtle)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <h2 style={{fontFamily:"var(--font-display)",fontSize:19,fontWeight:900,color:"var(--blue-800)"}}>Your data</h2>
        <button onClick={onClose} aria-label="Close" style={{background:"none",border:"none",fontSize:22,color:"var(--text-2)",cursor:"pointer"}}>✕</button>
      </div>
      <div style={{padding:"16px 20px",display:"flex",flexDirection:"column",gap:8}}>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onExport} style={{...btn,flex:1}}>Export JSON</button>
          <button onClick={onImport} style={{...btn,flex:1}}>Import JSON</button>
        </div>
        <button onClick={onTemplate} style={{...btn,border:"1px dashed var(--blue-300)",background:"var(--blue-50)"}}>Download import template</button>
        <p style={{fontSize:11,color:"var(--text-3)",lineHeight:1.5,margin:"2px 0"}}>The template is a JSON array with one example row and every field filled in. Valid codes — <b>theme</b>: {THEMES.map(t=>t.id).join(", ")}; <b>src</b>: {Object.keys(SOURCES).join(", ")}; <b>ws</b>: WS1, WS2, WS3, EXT; <b>lvl</b>: 1–4; <b>stance</b>: {STANCE_ORDER.filter(s=>s!=="official").join(", ")}; <b>wp</b>: 1–31 or null; <b>adj</b>: true/false.</p>
        <label style={{display:"flex",alignItems:"center",gap:9,padding:"8px 10px",borderRadius:9,border:"1px solid var(--border)",fontSize:13.5,color:"var(--text-1)",cursor:"pointer"}}><input type="checkbox" checked={sweepOn} onChange={e=>setSweepOn(e.target.checked)}/> Sonar sweep animation</label>
        <p style={{fontSize:11,color:"var(--text-3)",lineHeight:1.4,fontStyle:"italic",marginTop:2}}>Changes live in this browser session only. Export to keep your work.</p>
      </div>
    </div>
  </div>);
}

/* ===== APP ===== */
function App(){
  const [items,setItems]=useState(()=>[...UN80,...EXTERNAL]);
  const [view,setView]=useState("packages");
  const [activeSector,setActiveSector]=useState(null);
  const [srcFilter,setSrcFilter]=useState(()=>new Set(Object.keys(SOURCES)));
  const [wsFilter,setWsFilter]=useState(()=>new Set(["WS1","WS2","WS3","EXT"]));
  const [stanceFilter,setStanceFilter]=useState(()=>new Set(STANCE_ORDER));
  const [selId,setSelId]=useState(null);
  const [navStack,setNavStack]=useState([]);
  const [cluster,setCluster]=useState(null);
  const [showSources,setShowSources]=useState(false);
  const [srcHighlight,setSrcHighlight]=useState(null);
  const [showData,setShowData]=useState(false);
  const [editing,setEditing]=useState(null);
  const [editIsNew,setEditIsNew]=useState(false);
  const [sweepOn,setSweepOn]=useState(true);
  const [toast,setToast]=useState("");
  const fileRef=useRef(null);
  const reduced=useMemo(()=>window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches,[]);
  const [vw,setVw]=useState(typeof window!=="undefined"?window.innerWidth:1200);
  useEffect(()=>{const h=()=>setVw(window.innerWidth);window.addEventListener("resize",h);return ()=>window.removeEventListener("resize",h);},[]);
  const isMobile=vw<1160;
  const flash=m=>{setToast(m);setTimeout(()=>setToast(""),2200);};

  const layout=useMemo(()=>{
    const list=items.filter(i=>srcFilter.has(i.src||"un80")&&wsFilter.has(i.ws||"EXT")&&stanceFilter.has(i.stance||"official"));
    return computeLayout(list,view);
  },[items,srcFilter,wsFilter,stanceFilter,view]);
  const selected=useMemo(()=>selId?(layout.blips.find(b=>b.id===selId)||null):null,[selId,layout]);

  const counts=useMemo(()=>{const un=items.filter(i=>(i.src||"un80")==="un80").length;return {un,nw:items.length-un};},[items]);

  // distinct external source documents, for the Sources panel
  const sourceDocs=useMemo(()=>{const m=new Map();items.filter(i=>i.src!=="un80").forEach(i=>{const k=i.by||"Unattributed";m.set(k,(m.get(k)||0)+1);});return [...m.entries()].sort((a,b)=>b[1]-a[1]);},[items]);

  function ensureVisible(it){
    if(it){if(!srcFilter.has(it.src))setSrcFilter(p=>new Set(p).add(it.src));
      if(!wsFilter.has(it.ws))setWsFilter(p=>new Set(p).add(it.ws));
      if(!stanceFilter.has(it.stance))setStanceFilter(p=>new Set(p).add(it.stance));}
  }
  function clusterAt(b){const near=layout.blips.filter(o=>Math.hypot(o.x-b.x,o.y-b.y)<=(o.size+b.size+10));
    if(near.length<2)return null;const ids=near.map(o=>o.id);return {ids,idx:Math.max(0,ids.indexOf(b.id))};}
  function pick(ev){
    if(ev.blip){setNavStack([]);setCluster(clusterAt(ev.blip));setSelId(ev.blip.id);}
    else if(ev.sector)setActiveSector(a=>a===ev.sector?null:ev.sector);
  }
  function cycleCluster(){if(!cluster)return;const ni=(cluster.idx+1)%cluster.ids.length;setCluster({...cluster,idx:ni});setSelId(cluster.ids[ni]);}
  function jumpToWp(wp){setNavStack(s=>[...s,selId]);setCluster(null);setView("packages");
    setSrcFilter(p=>new Set(p).add("un80"));setWsFilter(new Set(["WS1","WS2","WS3","EXT"]));setStanceFilter(p=>new Set(p).add("official"));
    setSelId("wp"+wp);}
  function jumpToExt(id){const it=items.find(x=>x.id===id);setNavStack(s=>[...s,selId]);setCluster(null);ensureVisible(it);setSelId(id);}
  function goBack(){setCluster(null);if(navStack.length===0){setSelId(null);return;}const prev=navStack[navStack.length-1];setNavStack(navStack.slice(0,-1));setSelId(prev??null);}
  function closeDetail(){setSelId(null);setNavStack([]);setCluster(null);}

  function startAdd(){closeDetail();setEditIsNew(true);setEditing({id:"new"+Date.now(),name:"",theme:"devt",ws:"EXT",src:"tt",lvl:2,stance:"New",by:"",desc:""});}
  function startEdit(b){setEditIsNew(false);setEditing({...b,src:b.src||"un80",name:b.name||b.wpName});}
  function saveEdit(){const d={...editing,name:editing.name.trim()};setItems(p=>p.some(x=>x.id===d.id)?p.map(x=>x.id===d.id?{...x,...d}:x):[...p,d]);setEditing(null);flash(editIsNew?"Proposal added":"Saved");}
  function deleteItem(){setItems(p=>p.filter(x=>x.id!==editing.id));setEditing(null);closeDetail();flash("Deleted");}
  const toggle=(s,setS,k)=>setS(p=>{const n=new Set(p);n.has(k)?n.delete(k):n.add(k);return n;});
  const solo=(s,setS,keys,k)=>setS((s.size===1&&s.has(k))?new Set(keys):new Set([k]));
  const allSrc=Object.keys(SOURCES), allWs=WORKSTREAMS.map(w=>w.id), allStance=STANCE_ORDER;
  function exportJSON(){const b=new Blob([JSON.stringify(items,null,2)],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="reform-radar-data.json";a.click();URL.revokeObjectURL(u);flash("Data exported");}
  function downloadTemplate(){
    const example=[{id:"EXAMPLE-1",name:"Short title of the proposal",theme:"coord",lvl:2,ws:"WS3",src:"tt",stance:"New",by:"Institution — Author",wp:10,adj:true,desc:"One or two sentences on the idea and how it relates to a UN80 work package. Delete this row and add your own."}];
    const b=new Blob([JSON.stringify(example,null,2)],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="reform-radar-template.json";a.click();URL.revokeObjectURL(u);flash("Template downloaded");
  }
  function importJSON(e){const f=e.target.files&&e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(Array.isArray(d)){setItems(d);closeDetail();flash("Data imported");}else flash("File not recognised");}catch{flash("Could not read file");}};r.readAsText(f);e.target.value="";}
  const denseCard={...card,padding:13};
  const sub={fontSize:12,fontWeight:700,color:"var(--text-1)",marginBottom:7};
  const navBtn={display:"inline-flex",alignItems:"center",gap:7,padding:"9px 13px",borderRadius:10,border:"1px solid var(--blue-300)",background:"var(--blue-50)",color:"var(--blue-700)",fontWeight:700,fontSize:13,cursor:"pointer",whiteSpace:"nowrap"};
  const pill=(on)=>({padding:"5px 11px",borderRadius:999,fontSize:12.5,fontWeight:on?700:500,border:on?"1.5px solid var(--blue-500)":"1px solid var(--border)",background:on?"var(--blue-50)":"#fff",color:"var(--text-1)",cursor:"pointer"});
  const allOn=(s,keys)=>s.size===keys.length;

  const pageWrap=isMobile?{minHeight:"100vh",background:"var(--surface-page)"}:{height:"100vh",overflow:"hidden",background:"var(--surface-page)",display:"flex",justifyContent:"center"};
  const appShell=isMobile?{display:"flex",flexDirection:"column",minHeight:"100vh"}:{width:"100%",maxWidth:1760,height:"100%",display:"flex",flexDirection:"column",overflow:"hidden",borderLeft:"1px solid var(--border)",borderRight:"1px solid var(--border)"};
  const body=isMobile?{flex:1,display:"flex",flexDirection:"column"}:{flex:1,minHeight:0,display:"flex",flexDirection:"row"};
  const asideStyle=isMobile
    ?{width:"100%",padding:14,display:"flex",flexDirection:"column",gap:12,borderBottom:"1px solid var(--border)",background:"var(--surface-page)"}
    :{width:340,flexShrink:0,height:"100%",overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:12,borderRight:"1px solid var(--border)",background:"var(--surface-page)"};
  const mainStyle=isMobile
    ?{position:"relative",display:"flex",alignItems:"center",justifyContent:"center",padding:10,background:"radial-gradient(circle at 50% 46%, #0a2236 0%, #05101b 100%)",minHeight:420}
    :{flex:1,minWidth:0,position:"relative",display:"flex",alignItems:"center",justifyContent:"flex-start",padding:6,background:"radial-gradient(circle at 36% 47%, #0a2236 0%, #05101b 100%)",overflow:"hidden"};
  const radarBox=isMobile?{width:"100%",maxWidth:620,aspectRatio:"557 / 497"}:{height:"100%",aspectRatio:"557 / 497",maxWidth:"100%"};

  return (<div style={pageWrap}><div style={appShell}>
    <header style={{padding:isMobile?"12px 16px":"11px 24px",borderBottom:"1px solid var(--border)",background:"var(--surface-card)",flexShrink:0}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:16,flexWrap:"wrap"}}>
        <div style={{minWidth:0}}>
          <div style={{display:"flex",alignItems:"baseline",gap:10,flexWrap:"wrap"}}><span className="mono" style={{fontSize:10.5,letterSpacing:".18em",color:"var(--blue-500)",fontWeight:700}}>UN80 INITIATIVE</span><span style={{fontSize:10.5,color:"var(--text-3)"}}>tracking reform actions & proposals</span></div>
          <h1 style={{fontFamily:"var(--font-display)",fontWeight:900,fontSize:isMobile?"24px":"28px",color:"var(--blue-800)",lineHeight:1.1,marginTop:3}}>Reform Proposals Radar</h1>
        </div>
        <div style={{display:"flex",gap:8,flexShrink:0,flexWrap:"wrap"}}>
          <button onClick={startAdd} style={{...navBtn,border:"none",background:"var(--blue-500)",color:"#fff"}}>+ Add a proposal</button>
          <button onClick={()=>setShowData(true)} style={navBtn}>Your data</button>
          <button onClick={()=>{setSrcHighlight(null);setShowSources(true);}} style={navBtn}>View all sources <span className="mono" style={{fontSize:12,opacity:.8}}>({sourceDocs.length})</span></button>
        </div>
      </div>
      <div style={{marginTop:8,display:"flex",gap:isMobile?14:22,flexWrap:"wrap",fontSize:12.5,color:"var(--text-2)"}}>
        <span><b className="mono" style={{color:"var(--blue-700)",fontSize:13.5}}>{counts.un}</b> UN80 actions</span>
        <span><b className="mono" style={{color:"var(--blue-700)",fontSize:13.5}}>{counts.nw}</b> external proposals</span>
        <span>Showing <b style={{color:"var(--blue-700)"}}>{view==="packages"?"31 pkgs":"87 actions"} + {counts.nw}</b></span>
      </div>
    </header>

    <div style={body}>
      <aside style={asideStyle}>
        <div style={denseCard}><div style={{...lbl,marginBottom:8}}>View</div>
          <div style={{display:"flex",gap:6}}>{[["packages","Work packages"],["actions","Actions"]].map(([g,l])=><button key={g} onClick={()=>setView(g)} style={{flex:1,padding:"8px",borderRadius:8,fontSize:13,fontWeight:view===g?700:500,border:view===g?"1.5px solid var(--blue-500)":"1px solid var(--border)",background:view===g?"var(--blue-50)":"#fff",color:"var(--text-1)",cursor:"pointer"}}>{l}</button>)}</div>
          <div style={{...lbl,margin:"11px 0 7px"}}>Workstream</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            <button onClick={()=>setWsFilter(new Set(allWs))} style={pill(allOn(wsFilter,allWs))}>All</button>
            {WORKSTREAMS.map(w=><button key={w.id} onClick={()=>solo(wsFilter,setWsFilter,allWs,w.id)} aria-pressed={wsFilter.has(w.id)} style={pill(wsFilter.has(w.id)&&!allOn(wsFilter,allWs))}>{w.short}</button>)}
          </div>
        </div>

        <div style={denseCard}><div style={{...lbl,marginBottom:8}}>Sector · the angle</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}><button onClick={()=>setActiveSector(null)} style={pill(!activeSector)}>All</button>
          {THEMES.map(t=><Chip key={t.id} active={activeSector===t.id} color={t.color} onClick={()=>setActiveSector(activeSector===t.id?null:t.id)}>{t.short}</Chip>)}</div>
        </div>

        <div style={denseCard}><div style={{...lbl,marginBottom:8}}>Stance · the fill colour</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            <button onClick={()=>setStanceFilter(new Set(allStance))} style={pill(allOn(stanceFilter,allStance))}>All</button>
            {STANCE_ORDER.map(s=>{const on=stanceFilter.has(s)&&!allOn(stanceFilter,allStance);return <button key={s} onClick={()=>solo(stanceFilter,setStanceFilter,allStance,s)} aria-pressed={stanceFilter.has(s)} style={{display:"inline-flex",alignItems:"center",gap:7,padding:"5px 10px",borderRadius:999,fontSize:12.5,fontWeight:on?700:500,border:on?`1.5px solid ${STANCE[s].color}`:"1px solid var(--border)",background:on?"var(--blue-50)":"#fff",color:"var(--text-1)",cursor:"pointer"}}><span style={{width:11,height:11,borderRadius:"50%",background:STANCE[s].color,border:"1px solid rgba(0,0,0,.12)"}}/>{s==="official"?"Official":s}</button>;})}
          </div>
          <p style={{fontSize:11,color:"var(--text-3)",marginTop:8,lineHeight:1.4}}>Click a colour to spotlight only that stance; click it again or “All” to reset.</p>
        </div>

        {isMobile&&<ReadKey srcFilter={srcFilter} onSolo={k=>solo(srcFilter,setSrcFilter,allSrc,k)} onAll={()=>setSrcFilter(new Set(allSrc))} allOn={allOn(srcFilter,allSrc)}/>}
      </aside>

      <main style={mainStyle}>
        <div style={radarBox}><Sonar layout={layout} view={view} activeSector={activeSector} onPick={pick} selected={selected} reduced={reduced} sweepOn={sweepOn}/></div>
        {!isMobile&&!selected&&!editing&&<ReadKey dark srcFilter={srcFilter} onSolo={k=>solo(srcFilter,setSrcFilter,allSrc,k)} onAll={()=>setSrcFilter(new Set(allSrc))} allOn={allOn(srcFilter,allSrc)}/>}
        {selected&&!editing&&<Detail blip={selected} allItems={items} onClose={closeDetail} onEdit={startEdit} onJumpToWp={jumpToWp} onJumpToExt={jumpToExt} onBack={goBack} canBack={navStack.length>0} cluster={cluster?{pos:cluster.idx+1,len:cluster.ids.length}:null} onCycle={cycleCluster} onShowSources={(name)=>{setSrcHighlight(name||null);setShowSources(true);}}/>}
        {editing&&<EditForm draft={editing} setDraft={setEditing} onSave={saveEdit} onCancel={()=>setEditing(null)} onDelete={deleteItem} isNew={editIsNew}/>}
        {showSources&&<SourcesPanel docs={sourceDocs} highlight={srcHighlight} onClose={()=>{setShowSources(false);setSrcHighlight(null);}}/>}
        {showData&&<DataPanel onExport={exportJSON} onImport={()=>fileRef.current&&fileRef.current.click()} onTemplate={downloadTemplate} sweepOn={sweepOn} setSweepOn={setSweepOn} onClose={()=>setShowData(false)}/>}
      </main>
    </div>
    <input ref={fileRef} type="file" accept="application/json" onChange={importJSON} style={{display:"none"}}/>
    </div>
    {toast&&<div role="status" style={{position:"fixed",bottom:22,left:"50%",transform:"translateX(-50%)",background:"var(--blue-800)",color:"#fff",padding:"10px 18px",borderRadius:10,fontSize:13,fontWeight:600,zIndex:200,boxShadow:"0 8px 24px rgba(10,47,78,.3)"}}>{toast}</div>}
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
